<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Zelda Mini 3D</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    #info { position:absolute; top:10px; left:10px; color:white; font-family:Arial; font-size:20px; }
  </style>
</head>
<body>
<div id="info">❤️ Vies: 10</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// SCENE, CAMERA, RENDERER
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLES SOURIS
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0,1,0);
controls.maxPolarAngle = Math.PI / 2.1; // ne pas passer sous le sol
controls.minDistance = 5;
controls.maxDistance = 40;

// LUMIERE
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,30,20);
scene.add(light);

// SOL
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// JOUEUR
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x0000ff})
);
player.position.y = 1;
scene.add(player);

// ÉPÉE
const sword = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,1,0.2),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
sword.position.set(0.8,1,0);
player.add(sword);

// ARBRES
const trees = [];
for(let i=0;i<50;i++){
  const tree = new THREE.Mesh(
    new THREE.CylinderGeometry(0,1,3,8),
    new THREE.MeshStandardMaterial({color:0x006400})
  );
  tree.position.set((Math.random()-0.5)*350,1.5,(Math.random()-0.5)*350);
  scene.add(tree);
  trees.push(tree);
}

// ROCHERS
const rocks = [];
for(let i=0;i<30;i++){
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(2),
    new THREE.MeshStandardMaterial({color:0x555555})
  );
  rock.position.set((Math.random()-0.5)*350,1,(Math.random()-0.5)*350);
  scene.add(rock);
  rocks.push(rock);
}

// ENNEMIS
const enemies = [];
for(let i=0;i<6;i++){
  const e = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  e.position.set((Math.random()-0.5)*100,1,(Math.random()-0.5)*100);
  scene.add(e);
  enemies.push(e);
}

// VIES
let lives = 10;
const ui = document.getElementById("info");

// CONTROLES CLAVIER
const keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// COLLISION
function collide(pos,obj,size=2){ return pos.distanceTo(obj.position)<size; }

let lastHit = 0;

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  let next = player.position.clone();

  // Déplacement (ZQSD + flèches)
  if(keys["z"] || keys["arrowup"]) next.z -= 0.3;
  if(keys["s"] || keys["arrowdown"]) next.z += 0.3;
  if(keys["q"] || keys["arrowleft"]) next.x -= 0.3;
  if(keys["d"] || keys["arrowright"]) next.x += 0.3;

  // Limites map
  const limit = 190;
  if(next.x>limit) next.x=limit;
  if(next.x<-limit) next.x=-limit;
  if(next.z>limit) next.z=limit;
  if(next.z<-limit) next.z=-limit;

  let blocked=false;
  [...rocks,...trees,...enemies].forEach(obj=>{if(collide(next,obj,2)) blocked=true;});
  if(!blocked) player.position.copy(next);

  // Attaque
  if(keys[" "]){
    sword.rotation.z = Math.sin(Date.now()*0.02)*2;
    enemies.forEach(e=>{
      if(player.position.distanceTo(e.position)<2){
        e.position.set((Math.random()-0.5)*100,1,(Math.random()-0.5)*100);
      }
    });
  } else { sword.rotation.z = 0; }

  // Ennemis
  enemies.forEach(e=>{
    const dir = new THREE.Vector3().subVectors(player.position,e.position).normalize();
    e.position.add(dir.multiplyScalar(0.05));

    if(player.position.distanceTo(e.position)<1.5){
      const now=Date.now();
      if(now-lastHit>1000){
        lives--;
        ui.innerHTML = "❤️ Vies: "+lives;
        lastHit=now;
        if(lives<=0){ alert("💀 GAME OVER"); location.reload(); }
      }
    }
  });

  // Caméra suit le joueur + souris
  controls.target.copy(player.position);
  controls.update();

  renderer.render(scene,camera);
}

camera.position.set(0,15,20);
animate();
</script>
</body>
</html>
