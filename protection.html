<!DOCTYPE html>

<meta charset="UTF-8">
<title>Mini site de jeu</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
    user-select:none;
}

h1{
    margin-top:40px;
    font-size:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    animation: fadeIn 1.3s ease;
}

h2{text-align:center;margin-top:10px;}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;transform:translateY(0);}
}

.menu{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.card{
    width:260px;
    height:340px;
    background:#222;
    border-radius:20px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:scale(1.1) rotateZ(-1deg);
    box-shadow:0 0 25px #00eaff;
}

.card::before{
    content:"";
    position:absolute;
    inset:-50%;
    background:conic-gradient(#00eaff,#0077ff,#00eaff);
    animation:spin 3s linear infinite;
    opacity:0;
}

.card:hover::before{opacity:0.4;}

@keyframes spin{to{transform:rotate(360deg);}}

.card h2,.card-icon{position:relative;z-index:2;}
.card-icon{font-size:80px;margin-top:10px;}
.card h2{margin-top:110px;font-size:26px;}

audio{display:none;}
</style>
</head>
<h1 style="display:flex; align-items:center; justify-content:center; gap:20px; font-size:70px; margin-top:40px; animation: fadeIn 1.3s ease;">
