<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mini Mario Kart</title>
  <style>
    /* ----- Style général de la page ----- */
    body {
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #6fd4ff, #aaffc3);
      overflow: hidden;
    }
    h1 { color: #004aad; text-shadow: 2px 2px #b3f2a9; }

    /* ----- HUD (score, vies, timer, niveau) ----- */
    #hud {
      display: flex;
      justify-content: center;
      gap: 30px;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    #hud div {
      background: rgba(255,255,255,0.8);
      border-radius: 10px;
      padding: 5px 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    /* ----- Zone de jeu ----- */
    #game {
      width: 600px;
      height: 400px;
      position: relative;
      margin: auto;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 0 20px #00ff77;
      background: #87CEEB;
    }

    /* ----- Route et lignes ----- */
    .road {
      position: absolute;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(to bottom, #444 0px, #444 40px, #3a3a3a 40px, #3a3a3a 80px);
      clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
      top: 0; left: -50%;
      animation: scrollRoad 1.5s linear infinite;
      opacity: 0.95;
      z-index: 0;
    }
    @keyframes scrollRoad { from { background-position-y: 0; } to { background-position-y: 80px; } }

    .lane {
      position: absolute; width: 6px; height: 30px;
      background: white; left: 50%; transform: translateX(-50%);
      animation: laneMove 0.6s linear infinite; z-index: 1;
      box-shadow: 0 0 10px white; border-radius: 3px;
    }
    @keyframes laneMove { 0% { top: -40px; opacity: 1; } 100% { top: 400px; opacity: 0.3; } }

    /* ----- Voiture du joueur ----- */
    .car {
      width: 40px; height: 60px;
      background: url('images et musiques/voiture.png') no-repeat center center; 
      background-size: contain;
      position: absolute;
      border-radius: 8px;
      transition: transform 0.2s, filter 0.2s;
      z-index: 5;
    }
    .fast { filter: brightness(1.3) blur(1px); transform: perspective(80px) rotateX(15deg) scale(1.05); }

    /* ----- Pièces ----- */
    .coin {
      width: 20px; height: 20px;
      background: radial-gradient(circle, gold 40%, orange 100%);
      border-radius: 50%; position: absolute;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 10px gold; z-index: 2;
    }
    @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

    /* ----- Obstacles ----- */
    .obstacle {
      width: 50px; height: 20px;
      background: url('obstacle.png') no-repeat center center;
      background-size: contain;
      border-radius: 5px;
      position: absolute;
      box-shadow: inset -2px -2px 4px #333, inset 2px 2px 4px #bbb;
      z-index: 3;
    }

    /* ----- Ennemis ----- */
    .enemy {
      position: absolute; border-radius: 8px;
      background: url('images et musiques/vache.png') no-repeat center center;
      background-size: contain;
      z-index: 4;
      width: 50px; /* Augmentation de la taille des ennemis */
      height: 80px; /* Augmentation de la taille des ennemis */
    }

    /* Boss spécial */
    .boss {
      box-shadow: 0 0 25px 8px rgba(190,0,255,0.8);
      border: 2px solid rgba(255,255,255,0.5);
      background: url('boss.png') no-repeat center center;
      background-size: contain;
    }

    /* ----- Ecrans de démarrage et fin ----- */
    #startScreen, #endScreen {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.8); color:white;
      display:flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index:10;
    }

    button {
      padding:10px 25px; font-size:20px;
      border-radius:10px; border:none;
      background:linear-gradient(to right,#00c853,#00e676);
      color:white; box-shadow:0 0 10px #00ff80;
      cursor:pointer; transition:0.2s;
    }
    button:hover { transform:scale(1.05); background:linear-gradient(to right,#00b04d,#00c060); }
  </style>
</head>
<body tabindex="0">

<h1>🏎️ Mini Mario Kart Deluxe 3D 🏁</h1>

<!-- HUD -->
<div id="hud">
  <div id="score">Score: 0</div>
  <div id="lives">Vies: ❤️❤️❤️</div>
  <div id="timer">Temps: 60s</div>
  <div id="level">Niveau: 1</div>
</div>

<!-- Zone de jeu -->
<div id="game">
  <div class="road"></div>
  <div id="car" class="car" style="top:320px; left:280px;"></div>
</div>

<!-- Ecran de démarrage -->
<div id="startScreen">
  <h2>🚦 Êtes-vous prêt à conduire ? 🚗</h2>
  <button onclick="startGame()">Jouer</button>
</div>

<!-- Ecran de fin -->
<div id="endScreen" style="display:none;">
  <h2 id="endMessage"></h2>
  <button onclick="location.reload()">Rejouer</button>
</div>

<!-- Musique de fond -->
<audio id="bgMusic" src="images et musiques/musique kart.mp3" loop></audio>

<script>
/* ----- Variables principales ----- */
const game=document.getElementById('game');
const car=document.getElementById('car');
const startScreen=document.getElementById('startScreen');
const endScreen=document.getElementById('endScreen');
const endMessage=document.getElementById('endMessage');
const scoreDisplay=document.getElementById('score');
const livesDisplay=document.getElementById('lives');
const timerDisplay=document.getElementById('timer');
const levelDisplay=document.getElementById('level');
const bgMusic = document.getElementById('bgMusic');

let score=0, lives=3, timeLeft=60, currentLevel=0, gameOver=false;
let timerInterval, enemyInterval, laneInterval;

/* ----- Création des niveaux ----- */
const levels=[];
for(let i=0;i<20;i++){
  let coins=[], obstacles=[];
  for(let c=0;c<3;c++) coins.push({top:Math.random()*350,left:Math.random()*570});
  for(let o=0;o<3;o++) obstacles.push({top:Math.random()*350,left:Math.random()*550});
  levels.push({coins,obstacles});
}

function updateLives(){ livesDisplay.textContent='Vies: '+ '❤️'.repeat(lives); }

function endGame(msg){
  gameOver=true;
  clearInterval(timerInterval);
  clearInterval(enemyInterval);
  clearInterval(laneInterval);
  bgMusic.pause();
  endMessage.textContent=msg + "\nScore final : "+score;
  endScreen.style.display='flex';
}

function spawnLane(){
  if(gameOver) return;
  const lane=document.createElement('div');
  lane.className='lane';
  game.appendChild(lane);
  setTimeout(()=>lane.remove(),600);
}

function checkCollision(newLeft,newTop){
  const obstacles=document.querySelectorAll('.obstacle');
  for(let obs of obstacles){
    const oLeft=parseInt(obs.style.left);
    const oTop=parseInt(obs.style.top);
    if(newLeft < oLeft + 50 &&
       newLeft + 40 > oLeft &&
       newTop < oTop + 20 &&
       newTop + 60 > oTop)
      return true;
  }
  return false;
}

function loadLevel(index){
  game.querySelectorAll('.coin, .obstacle, .enemy').forEach(e=>e.remove());
  game.appendChild(car);

  levelDisplay.textContent='Niveau: '+(index+1);
  timeLeft=60; timerDisplay.textContent='Temps: '+timeLeft+'s';

  levels[index].coins.forEach(c=>{
    const coin=document.createElement('div');
    coin.className='coin';
    coin.style.top=c.top+'px';
    coin.style.left=c.left+'px';
    game.appendChild(coin);
  });

  levels[index].obstacles.forEach(o=>{
    const obs=document.createElement('div');
    obs.className='obstacle';
    obs.style.top=o.top+'px';
    obs.style.left=o.left+'px';
    game.appendChild(obs);
  });

  for(let i=0;i<3;i++){ 
    const enemy=document.createElement('div');
    enemy.className='enemy';
    enemy.style.width='50px';  // Nouvelle largeur des ennemis
    enemy.style.height='80px'; // Nouvelle hauteur des ennemis
    enemy.dataset.speed=6;
    enemy.style.top=Math.random()*350+'px';
    enemy.style.left=Math.random()*570+'px';
    game.appendChild(enemy);
  }

  if((index+1)%7===0){ 
    const boss=document.createElement('div');
    boss.className='enemy boss';
    boss.style.width='60px'; boss.style.height='90px';
    boss.dataset.speed=7;
    boss.style.top='0px'; boss.style.left='0px';
    game.appendChild(boss);
  }
}

function startGame(){
  startScreen.style.display='none';
  game.style.display='block';
  document.body.focus();
  updateLives();
  loadLevel(currentLevel);
  bgMusic.play(); // démarre la musique

  laneInterval=setInterval(spawnLane,300);

  timerInterval=setInterval(()=>{
    if(gameOver) return;
    timeLeft--;
    timerDisplay.textContent='Temps: '+timeLeft+'s';
    if(timeLeft<=0) endGame("⏰ Temps écoulé ! Vous êtes nul !");
  },1000);

  enemyInterval=setInterval(()=>{
    if(gameOver) return;
    document.querySelectorAll('.enemy').forEach(enemy=>{
      let left=parseInt(enemy.style.left);
      let speed=parseInt(enemy.dataset.speed)||6;
      if(left<570) enemy.style.left=left+speed+'px';
      else enemy.style.left='0px';
    });
  },120);
}

document.addEventListener('keydown', e=>{
  if(gameOver) return;
  let left=parseInt(car.style.left);
  let top=parseInt(car.style.top);
  let newLeft=left, newTop=top;

  if(e.key==='ArrowLeft') newLeft=Math.max(0,left-10);
  if(e.key==='ArrowRight') newLeft=Math.min(560,left+10);
  if(e.key==='ArrowUp') newTop=Math.max(0,top-10);
  if(e.key==='ArrowDown') newTop=Math.min(340,top+10);

  if(!checkCollision(newLeft,newTop)){
    car.style.left=newLeft+'px';
    car.style.top=newTop+'px';
  }

  car.classList.add('fast');
  setTimeout(()=>car.classList.remove('fast'),150);

  document.querySelectorAll('.coin').forEach(coin=>{
    if(coin.style.display!=='none'){
      const cLeft=parseInt(coin.style.left);
      const cTop=parseInt(coin.style.top);
      if(Math.abs(newLeft-cLeft)<25 && Math.abs(newTop-cTop)<25){
        coin.style.display='none';
        score++;
        scoreDisplay.textContent='Score: '+score;
      }
    }
  });

  document.querySelectorAll('.enemy').forEach(enemy=>{
    const eLeft=parseInt(enemy.style.left);
    const eTop=parseInt(enemy.style.top);
    const eWidth=parseInt(enemy.style.width);
    const eHeight=parseInt(enemy.style.height);
    if(newLeft < eLeft + eWidth && newLeft + 40 > eLeft &&
       newTop < eTop + eHeight && newTop + 60 > eTop){
      lives--;
      updateLives();
      if(lives<=0) endGame("On ne te félicite pas!");
      car.style.left='280px';
      car.style.top='320px';
    }
  });

  if(document.querySelectorAll('.coin:not([style*="display: none"])').length===0){
    currentLevel++;
    if(currentLevel<levels.length) loadLevel(currentLevel);
    else endGame("🏆 Bravo ! T'es le Big Boss !");
  }
});
</script>
</body>
</html>
