<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Attrape-Pommes 🍎🍐</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}
canvas {
    display: block;
    margin: auto;
    border: 2px solid #38bdf8;
    background: #020617;
}
button {
    padding: 10px 20px;
    margin: 8px;
    font-size: 16px;
    cursor: pointer;
}
.hidden { display: none; }
</style>
</head>
<body>

<h1>🍎 Attrape-Pommes 🍎</h1>

<div id="menu">
    <p>🏆 Record : <span id="best">0</span></p>
    <button onclick="startGame()">▶ Jouer</button>
</div>

<div id="gameOver" class="hidden">
    <h2>💀 Game Over 💀</h2>
    <p>Score final : <span id="finalScore">0</span></p>
    <button onclick="startGame()">🔄 Rejouer</button>
</div>

<p id="hud" class="hidden">
Score : <span id="score">0</span> |
Vies : <span id="lives">3</span> |
Pouvoirs ⚡ : <span id="power">1</span> |
Combo 🔥 : <span id="combo">0</span> |
Niveau : <span id="level">1</span>
</p>

<canvas id="game" width="360" height="500"></canvas>

<script>
/* ===== SETUP ===== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0, lives = 3, combo = 0, level = 1, power = 1;
let fruits = [];
let playing = false;

let baseSpeed = 2;
let speed = 2;
let slowActive = false;

const player = { x: 160, y: 455, w: 60, h: 25 };

const bestScore = localStorage.getItem("bestScore") || 0;
document.getElementById("best").textContent = bestScore;

/* ===== AUDIO ===== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function sound(freq, dur = 0.12) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
}

/* ===== CONTROLS ===== */
const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let spacePressed = false;
document.addEventListener("keydown", e => {
    if (e.code === "Space" && !spacePressed && playing) {
        usePower();
        spacePressed = true;
    }
});
document.addEventListener("keyup", e => {
    if (e.code === "Space") spacePressed = false;
});

/* ===== GAME ===== */
function startGame() {
    score = 0; lives = 3; combo = 0; level = 1; power = 1;
    fruits = []; playing = true;
    slowActive = false;

    document.getElementById("menu").classList.add("hidden");
    document.getElementById("gameOver").classList.add("hidden");
    document.getElementById("hud").classList.remove("hidden");

    update();
}

function spawnFruit() {
    fruits.push({
        x: Math.random() * 320,
        y: -20,
        type: Math.random() < 0.1 ? "bonus" : (Math.random() < 0.25 ? "pear" : "apple")
    });
}

function drawBasket() {
    ctx.fillStyle = "#a16207";
    ctx.fillRect(player.x, player.y + 8, player.w, player.h - 8);

    ctx.fillStyle = "#facc15";
    ctx.fillRect(player.x - 4, player.y + 5, player.w + 8, 6);

    ctx.strokeStyle = "#fde047";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(player.x + player.w / 2, player.y + 10, player.w / 2, Math.PI, 0);
    ctx.stroke();
}

function usePower() {
    if (power > 0 && !slowActive) {
        slowActive = true;
        power--;
        sound(600);
        setTimeout(() => slowActive = false, 3000);
    }
}

function gameOver() {
    playing = false;
    document.getElementById("hud").classList.add("hidden");
    document.getElementById("gameOver").classList.remove("hidden");
    document.getElementById("finalScore").textContent = score;
    if (score > bestScore) localStorage.setItem("bestScore", score);
    document.getElementById("best").textContent = Math.max(score, bestScore);
}

function update() {
    if (!playing) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (keys["ArrowLeft"]) player.x -= 6;
    if (keys["ArrowRight"]) player.x += 6;
    player.x = Math.max(0, Math.min(300, player.x));

    drawBasket();

    fruits.forEach((f,i)=>{
        f.y += speed;

        if (f.type === "apple") {
            ctx.fillStyle="#ef4444";
            ctx.beginPath();
            ctx.arc(f.x+10,f.y+12,9,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#15803d";
            ctx.beginPath();
            ctx.ellipse(f.x+14,f.y+4,4,2,-0.5,0,Math.PI*2);
            ctx.fill();
        }
        else if (f.type === "pear") {
            ctx.fillStyle="#22c55e";
            ctx.beginPath();
            ctx.arc(f.x+10,f.y+14,9,0,Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(f.x+10,f.y+6,5,0,Math.PI*2);
            ctx.fill();
        }
        else if (f.type === "bonus") {
            ctx.fillStyle="#facc15";
            ctx.beginPath();
            ctx.arc(f.x+10,f.y+10,10,0,Math.PI*2);
            ctx.fill();
        }

        if (
            f.x < player.x + player.w &&
            f.x + 20 > player.x &&
            f.y < player.y + player.h &&
            f.y + 20 > player.y
        ) {
            if (f.type === "apple") { score++; combo++; sound(500); }
            if (f.type === "pear") { lives--; combo=0; sound(120); }
            if (f.type === "bonus") { score+=2; power++; sound(700); }
            fruits.splice(i,1);
        }

        if (f.y > 500) fruits.splice(i,1);
    });

    if (Math.random() < 0.03 + level * 0.005) spawnFruit();

    level = 1 + Math.floor(score / 15);
    baseSpeed = 2 + level * 0.5;
    speed = slowActive ? baseSpeed / 2 : baseSpeed;

    scoreEl.textContent = score;
    livesEl.textContent = lives;
    comboEl.textContent = combo;
    levelEl.textContent = level;
    powerEl.textContent = power;

    if (lives <= 0) return gameOver();

    requestAnimationFrame(update);
}

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const comboEl = document.getElementById("combo");
const levelEl = document.getElementById("level");
const powerEl = document.getElementById("power");
</script>

</body>
</html>
