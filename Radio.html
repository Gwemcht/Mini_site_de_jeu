<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📻 Radio</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
    text-align:center;
    margin:0;
}

h1{
    color:#ff4d4d;
    margin-top:60px;
}

input{
    width:80%;
    max-width:500px;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

#results{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    background:#ff4d4d;
    transform:scale(1.03);
}

.card img{
    width:60px;
    height:60px;
    border-radius:10px;
    object-fit:cover;
}

audio{
    width:90%;
    max-width:600px;
    margin:15px;
}

#menuBtn{
    position:absolute;
    top:10px;
    left:10px;
    padding:8px 15px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(to right,#ff9800,#ffb74d);
    color:white;
    box-shadow:0 0 10px #ff9800;
}

#visualizer{
    position:fixed;
    top:10px;
    right:10px;
    width:180px;
    height:80px;
    opacity:.8;
    pointer-events:none;
}
</style>
</head>

<body>

<button id="menuBtn" onclick="goToMenu()">🏠 Menu</button>

<h1>📻 Radio</h1>

<input
id="search"
type="text"
placeholder="Rechercher une radio (NRJ, Jazz, France Info...)"
>

<audio id="player" crossorigin="anonymous"></audio>

<canvas id="visualizer"></canvas>

<div id="results"></div>

<script>

const API =
"https://de1.api.radio-browser.info/json/stations/search?hidebroken=true&limit=50&name=";

const player = document.getElementById("player");
const results = document.getElementById("results");

let audioCtx;
let analyser;
let source;
let dataArray;

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

canvas.width = 180;
canvas.height = 80;

// =========================
// VISUALIZER
// =========================

function setupAudio(){

    if(audioCtx) return;

    audioCtx = new(window.AudioContext || window.webkitAudioContext)();

    source = audioCtx.createMediaElementSource(player);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    const bufferLength = analyser.frequencyBinCount;

    dataArray = new Uint8Array(bufferLength);

    draw();
}

function draw(){

    requestAnimationFrame(draw);

    if(!analyser) return;

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const barWidth = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){

        const barHeight = dataArray[i] / 2;

        ctx.fillStyle = "#ff4d4d";

        ctx.fillRect(
            i * barWidth,
            canvas.height - barHeight,
            barWidth - 2,
            barHeight
        );
    }
}

// =========================
// PLAY RADIO
// =========================

async function playStation(url){

    try{

        player.pause();

        player.src = url;

        await player.play();

        setupAudio();

    }catch(error){

        console.error(error);

        alert("Impossible de lire cette radio.");
    }
}

player.addEventListener("error",()=>{

    alert("Flux radio indisponible.");
});

// =========================
// SEARCH
// =========================

async function search(query){

    try{

        const response =
        await fetch(API + encodeURIComponent(query));

        let data = await response.json();

        // radios valides uniquement
        data = data.filter(station =>
            station.url_resolved &&
            station.lastcheckok === 1
        );

        // tri popularité
        data.sort(
            (a,b) => b.clickcount - a.clickcount
        );

        // suppression doublons
        data = [
            ...new Map(
                data.map(station => [
                    station.name.toLowerCase(),
                    station
                ])
            ).values()
        ];

        results.innerHTML = "";

        if(data.length === 0){

            results.innerHTML =
            "<h2>Aucune radio trouvée</h2>";

            return;
        }

        data.forEach(station => {

            const card = document.createElement("div");

            card.className = "card";

            card.innerHTML = `
                <img
                src="${station.favicon || ''}"
                onerror="this.style.display='none'">

                <h3>${station.name}</h3>

                <p>🌍 ${station.country || 'Inconnu'}</p>
            `;

            card.addEventListener("click",()=>{

                playStation(station.url_resolved);
            });

            results.appendChild(card);
        });

    }catch(error){

        console.error(error);

        results.innerHTML =
        "<h2>Erreur de connexion à l'API</h2>";
    }
}

// =========================
// LIVE SEARCH
// =========================

document
.getElementById("search")
.addEventListener("input",(e)=>{

    const value = e.target.value.trim();

    if(value.length > 2){

        search(value);

    }else{

        results.innerHTML = "";
    }
});

// =========================
// MENU
// =========================

function goToMenu(){

    window.location.href = "index.html";
}

</script>

</body>
</html>
