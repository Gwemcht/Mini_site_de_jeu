<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="images et musiques/LogoMinisitedejeu.png">
<title>Fruit Ninja</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
touch-action:none;
overscroll-behavior:none;
}

canvas{
display:block;
background:#01004553;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:20px;
z-index:10;
font-family:Arial,sans-serif;
}

#menuBtn{
position:absolute;
top:10px;
left:120px;
padding:8px 15px;
font-size:16px;
border-radius:8px;
border:none;
background:linear-gradient(to right,#ff9800,#ffb74d);
color:white;
box-shadow:0 0 10px #ff9800;
cursor:pointer;
z-index:20;
}

#modeBtn{
position:absolute;
top:10px;
left:240px;
padding:8px 15px;
font-size:16px;
border-radius:8px;
border:none;
background:linear-gradient(to right,#4caf50,#66bb6a);
color:white;
box-shadow:0 0 10px #4caf50;
cursor:pointer;
z-index:20;
}

#gameOverScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
font-family:Arial,sans-serif;
z-index:9999;
}

#gameOverScreen h1{
font-size:60px;
margin:0 0 20px;
color:#ff4444;
}

#gameOverScreen p{
font-size:30px;
margin-bottom:25px;
}

#gameOverScreen button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:12px;
background:#4caf50;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span>
<br>
<span id="lifeDisplay">Vies: <span id="lives">3</span></span>
</div>

<canvas id="c"></canvas>

<button onclick="goToMenu()" id="menuBtn">🏠 Menu</button>
<button id="modeBtn">Passer en mode Infini</button>

<div id="gameOverScreen">
    <h1>💀 GAME OVER</h1>
    <p>Score final : <span id="finalScore">0</span></p>
    <button onclick="restartGame()">🔄 Rejouer</button>
</div>

<script>
const c=document.getElementById("c");
const x=c.getContext("2d");

let fruits=[],halves=[],particles=[];
let score=0;

let mode="classique";
let vies=3;
let gameOverState=false;

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
window.onresize=resize;
resize();

/* ---------------- FRUIT ---------------- */
class Fruit{
constructor(){
this.x = 80 + Math.random()*(c.width-160);
this.y = c.height + 60;

this.vx = (Math.random()-0.5)*1.5;
this.vy = -Math.random()*12-10;

this.e=["🍎","🍌","🍉","🍇","🍊","🍓","🍒","🍈","🍐","🍋","🥑","🥝","🥭","🍍"][Math.random()*14|0];
this.dead=false;
}

update(){

this.x += this.vx;
this.y += this.vy;

this.vy += 0.25;

/* 🧱 MURS */
if(this.x < 40){
this.x = 40;
this.vx = Math.abs(this.vx);
}

if(this.x > c.width - 40){
this.x = c.width - 40;
this.vx = -Math.abs(this.vx);
}

/* 🔥 MUR DU HAUT (IMPORTANT) */
if(this.y < 40){
this.y = 40;
this.vy = Math.abs(this.vy);
}

/* 💀 SORTIE BAS */
if(this.y > c.height + 120){
this.dead = true;
}
}

draw(){
x.font="60px Arial";
x.textAlign="center";
x.fillText(this.e,this.x,this.y);
}
}

/* ---------------- RESTE IDENTIQUE ---------------- */
class Half{
constructor(f){
this.x=f.x;
this.y=f.y;
this.e=f.e;
this.vx=(Math.random()-0.5)*6;
this.vy=-Math.random()*8;
this.life=40;
}
update(){
this.x+=this.vx;
this.y+=this.vy;
this.vy+=0.3;
this.life--;
}
draw(){
x.globalAlpha=this.life/40;
x.font="40px Arial";
x.textAlign="center";
x.fillText(this.e,this.x,this.y);
x.globalAlpha=1;
}
}

class Particle{
constructor(x,y){
this.x=x;
this.y=y;
this.vx=(Math.random()-0.5)*6;
this.vy=(Math.random()-0.5)*6;
this.life=25;
}
update(){
this.x+=this.vx;
this.y+=this.vy;
this.vy+=0.1;
this.life--;
}
draw(){
x.globalAlpha=this.life/25;
x.font="18px Arial";
x.fillText("💥",this.x,this.y);
x.globalAlpha=1;
}
}

function goToMenu(){
window.location.href="index.html";
}

/* ---------------- SPAWN ---------------- */
function spawnFruit(){

if(gameOverState) return;

if(mode==="infini"){
if(fruits.length<10) fruits.push(new Fruit());
}else{
if(fruits.length<4) fruits.push(new Fruit());
}

setTimeout(spawnFruit, mode==="infini" ? 400 : 900);
}
spawnFruit();

/* ---------------- INPUT ---------------- */
let mouse=false;
let path=[];

c.addEventListener("mousedown",()=>{mouse=true;path=[];});
c.addEventListener("mouseup",()=>{mouse=false;});
c.addEventListener("touchstart",()=>{mouse=true;path=[];},{passive:false});
c.addEventListener("touchend",()=>{mouse=false;},{passive:false});

c.addEventListener("mousemove",e=>handleMove(e.clientX,e.clientY));
c.addEventListener("touchmove",e=>{
let t=e.touches[0];
handleMove(t.clientX,t.clientY);
e.preventDefault();
},{passive:false});

function handleMove(cx,cy){
let rect=c.getBoundingClientRect();
let p={
x:(cx-rect.left)*(c.width/rect.width),
y:(cy-rect.top)*(c.height/rect.height)
};

if(mouse){
path.push(p);
if(path.length>15) path.shift();
check(p);
}
}

/* ---------------- COLLISION ---------------- */
function check(p){

if(gameOverState) return;

for(let i=fruits.length-1;i>=0;i--){
let f=fruits[i];

let dx=f.x-p.x;
let dy=f.y-p.y;

if(dx*dx+dy*dy<1600){

score++;
document.getElementById("score").innerText=score;

halves.push(new Half(f));
halves.push(new Half(f));

for(let j=0;j<5;j++){
particles.push(new Particle(f.x,f.y));
}

fruits.splice(i,1);
}
}
}

/* ---------------- GAME OVER ---------------- */
function gameOver(){
gameOverState=true;
document.getElementById("finalScore").innerText=score;
document.getElementById("gameOverScreen").style.display="flex";
}

/* ---------------- RESTART ---------------- */
function restartGame(){

score=0;
vies=3;
gameOverState=false;

fruits=[];
halves=[];
particles=[];
path=[];

document.getElementById("score").innerText=0;
document.getElementById("lives").innerText=3;

document.getElementById("gameOverScreen").style.display="none";

spawnFruit();
}

/* ---------------- MODE ---------------- */
const modeBtn=document.getElementById("modeBtn");

modeBtn.onclick=()=>{

if(mode==="classique"){
mode="infini";
modeBtn.textContent="Passer en mode Classique";
document.getElementById("lifeDisplay").style.display="none";
}else{
mode="classique";
modeBtn.textContent="Passer en mode Infini";
document.getElementById("lifeDisplay").style.display="block";
vies=3;
document.getElementById("lives").innerText=vies;
}
};

/* ---------------- LOOP ---------------- */
function loop(){

if(gameOverState){
requestAnimationFrame(loop);
return;
}

x.clearRect(0,0,c.width,c.height);

/* fruits */
for(let i=fruits.length-1;i>=0;i--){
fruits[i].update();
fruits[i].draw();

if(fruits[i].dead){

if(mode==="classique"){
vies--;
document.getElementById("lives").innerText=vies;

if(vies<=0) gameOver();
}

fruits.splice(i,1);
}
}

/* halves */
for(let h of halves){
h.update();
h.draw();
}
halves=halves.filter(h=>h.life>0);

/* particles */
for(let p of particles){
p.update();
p.draw();
}
particles=particles.filter(p=>p.life>0);

/* sword */
for(let i=0;i<path.length-1;i++){
let a=path[i];
let b=path[i+1];

x.globalAlpha=i/path.length;
x.strokeStyle="white";
x.lineWidth=5;
x.lineCap="round";

x.beginPath();
x.moveTo(a.x,a.y);
x.lineTo(b.x,b.y);
x.stroke();
}

if(!mouse && path.length>0){
path.shift();
}

x.globalAlpha=1;
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
