<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Football IA</title>
<link rel="icon" type="image/png" href="images et musiques/LogoMinisitedejeu.png">

<style>
body{
    margin:0;
    overflow:hidden;
    background:#145a32;
    font-family:Arial;
}

canvas{
    display:block;
    margin:auto;
    background:#27ae60;
    border:5px solid white;
}

#score{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:32px;
    font-weight:bold;
    z-index:10;
}

#menuBtn{
  position:absolute;
  top:10px;
  left:10px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:linear-gradient(to right,#ff9800,#ffb74d);
  color:white;
  cursor:pointer;
  z-index:20;
}

#modeMenu{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#modeMenu h1{
    color:white;
    font-size:60px;
    margin-bottom:20px;
}

#modeMenu button{
    padding:15px 30px;
    margin:10px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#f39c12;
    color:white;
}
</style>
</head>

<body>

<div id="score">Choisis un mode</div>

<div id="modeMenu">
    <h1>⚽ Football</h1>
    <button onclick="startGame(1)">1 Joueur </button>
    <button onclick="startGame(2)">2 Joueurs</button>
</div>

<canvas id="game" width="1000" height="600"></canvas>

<button onclick="goToMenu()" id="menuBtn">🏠 Menu</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");

let playerScore = 0;
let aiScore = 0;

let gameMode = 1;
let gameStarted = false;

const goalTop = 220;
const goalBottom = 380;
const SPEED = 4;

// IMAGES
const playerImg = new Image();
playerImg.src = "images et musiques/joueurdefoot.png";

const aiImg = new Image();
aiImg.src = "images et musiques/ennemidefoot.png";

const ballImg = new Image();
ballImg.src = "images et musiques/ballondefoot.png";

// OBJETS
const player = { x:150, y:300, r:22, speed:SPEED };
const ai = { x:850, y:300, r:22, speed:SPEED };
const ball = { x:500, y:300, r:12, vx:2, vy:1 };

const keys = {};

document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

function startGame(mode){
    gameMode = mode;
    gameStarted = true;
    document.getElementById("modeMenu").style.display = "none";
    reset();
    update();
}

// ================= CONTROLES =================

// JOUEUR 1 = Flèches (mode 1 joueur) OU IA remplacée en 2 joueurs
function movePlayer(){

    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;

    keepInMap(player);
}

// JOUEUR 2 = ZQSD (mode 2 joueurs)
function movePlayer2(){

    if(keys["z"] || keys["Z"]) ai.y -= ai.speed;
    if(keys["s"] || keys["S"]) ai.y += ai.speed;
    if(keys["q"] || keys["Q"]) ai.x -= ai.speed;
    if(keys["d"] || keys["D"]) ai.x += ai.speed;

    keepInMap(ai);
}

// IA (mode 1 joueur)
function moveAI(){

    const dx = ball.x - ai.x;
    const dy = ball.y - ai.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    let escapeX = 0;
    let escapeY = 0;

    const margin = 70;

    if(ball.x < margin) escapeX = 3;
    if(ball.x > canvas.width-margin) escapeX = -3;
    if(ball.y < margin) escapeY = 3;
    if(ball.y > canvas.height-margin) escapeY = -3;

    if(dist > 1){
        ai.x += (dx/dist)*ai.speed + escapeX;
        ai.y += (dy/dist)*ai.speed + escapeY;
    }

    keepInMap(ai);
}

// ============================================

function keepInMap(p){
    if(p.x < p.r) p.x = p.r;
    if(p.x > canvas.width-p.r) p.x = canvas.width-p.r;
    if(p.y < p.r) p.y = p.r;
    if(p.y > canvas.height-p.r) p.y = canvas.height-p.r;
}

function hitBall(p){
    const dx = ball.x - p.x;
    const dy = ball.y - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const min = p.r + ball.r;

    if(dist < min){
        const angle = Math.atan2(dy,dx);
        const push = min - dist;

        ball.x += Math.cos(angle)*push;
        ball.y += Math.sin(angle)*push;

        let vx = Math.cos(angle);
        let vy = Math.sin(angle);

        if(p === ai && gameMode === 1){
            vx -= 0.5;
        }

        ball.vx = vx * 8;
        ball.vy = vy * 8;
    }
}

function moveBall(){

    ball.x += ball.vx;
    ball.y += ball.vy;

    ball.vx *= 0.98;
    ball.vy *= 0.98;

    // MURS HAUT / BAS
    if(ball.y < ball.r){
        ball.y = ball.r;
        ball.vy *= -1;
    }

    if(ball.y > canvas.height - ball.r){
        ball.y = canvas.height - ball.r;
        ball.vy *= -1;
    }

    // MUR GAUCHE (hors but)
    if(ball.x - ball.r <= 10){

        if(ball.y > goalTop && ball.y < goalBottom){
            aiScore++;
            update();
            reset();
            return;
        }

        ball.x = ball.r + 10;
        ball.vx *= -1;
    }

    // MUR DROIT (hors but)
    if(ball.x + ball.r >= canvas.width - 10){

        if(ball.y > goalTop && ball.y < goalBottom){
            playerScore++;
            update();
            reset();
            return;
        }

        ball.x = canvas.width - ball.r - 10;
        ball.vx *= -1;
    }
}

function update(){
    if(gameMode === 1){
        scoreText.innerText = `Toi ${playerScore} - ${aiScore} Ennemi`;
    }else{
        scoreText.innerText = `Joueur 1️⃣ ${playerScore} - ${aiScore} Joueur 2️⃣`;
    }
}

function reset(){
    player.x=150; player.y=300;
    ai.x=850; ai.y=300;
    ball.x=500; ball.y=300;
    ball.vx=2; ball.vy=1;
}

function goToMenu(){
    location.reload();
}

// ================= LOOP =================

function loop(){

    if(!gameStarted){
        requestAnimationFrame(loop);
        return;
    }

    drawField();

    movePlayer();

    if(gameMode === 1){
        moveAI();
    }else{
        movePlayer2();
    }

    hitBall(player);
    hitBall(ai);
    moveBall();

    drawPlayer(player,playerImg);
    drawPlayer(ai,aiImg);
    drawBall();

    requestAnimationFrame(loop);
}

function drawField(){
    ctx.fillStyle="#27ae60";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="white";
    ctx.lineWidth=4;

    ctx.beginPath();
    ctx.moveTo(canvas.width/2,0);
    ctx.lineTo(canvas.width/2,canvas.height);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(canvas.width/2,canvas.height/2,80,0,Math.PI*2);
    ctx.stroke();

    ctx.fillStyle="white";
    ctx.fillRect(0,220,20,160);
    ctx.fillRect(canvas.width-20,220,20,160);
}

function drawPlayer(p,img){
    ctx.drawImage(img,p.x-p.r,p.y-p.r,p.r*2,p.r*2);
}

function drawBall(){
    ctx.drawImage(ballImg,ball.x-ball.r,ball.y-ball.r,ball.r*2,ball.r*2);
}

loop();

</script>

</body>
</html>
