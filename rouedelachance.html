<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roue de la chance</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #05060a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  position: relative;
  width: 320px;
  margin: 30px auto;
}

.pointer {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 26px solid #ffffff; /* ✅ bon sens */
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
}

canvas {
  border-radius: 50%;
  box-shadow: 0 20px 80px rgba(0,0,0,0.8);
}

input, button {
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  cursor: pointer;
  background: #222;
  color: white;
}

</style>
</head>

<body>

<h1>🎰 Roue de la chance</h1>

<div id="inputs">
  <input class="choice" placeholder="Choix 1">
  <input class="choice" placeholder="Choix 2">
</div>

<br>

<button onclick="addChoice()">Ajouter</button>
<button onclick="spin()">Tourner</button>

<div class="container">
  <div class="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<h2 id="result">Résultat : -</h2>

<script>
let angle = 0;
let velocity = 0;
let spinning = false;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

/* 📥 choix */
function getChoices(){
  return [...document.querySelectorAll(".choice")]
    .map(i => i.value.trim())
    .filter(Boolean);
}

function addChoice(){
  const i = document.createElement("input");
  i.className = "choice";
  i.placeholder = "Nouveau choix";
  document.getElementById("inputs").appendChild(i);
}

/* 🎨 draw */
function draw(){
  const choices = getChoices();
  if(!choices.length) return;

  const r = 140;
  const c = 150;

  ctx.clearRect(0,0,300,300);

  for(let i=0;i<choices.length;i++){
    const start = i * 2*Math.PI / choices.length + angle;
    const end = (i+1) * 2*Math.PI / choices.length + angle;

    ctx.beginPath();
    ctx.moveTo(c,c);
    ctx.arc(c,c,r,start,end);
    ctx.fillStyle = `hsl(${i*360/choices.length},70%,60%)`;
    ctx.fill();

    ctx.save();
    ctx.translate(c,c);
    ctx.rotate((start+end)/2);
    ctx.fillStyle = "#111";
    ctx.textAlign = "right";
    ctx.font = "14px Arial";
    ctx.fillText(choices[i], r-10, 5);
    ctx.restore();
  }
}

/* 🎰 SPIN PHYSIQUE */
function spin(){
  if(spinning) return;

  const choices = getChoices();
  if(choices.length < 2){
    alert("Ajoute au moins 2 choix !");
    return;
  }

  spinning = true;

  velocity = 0.25 + Math.random()*0.25; // vitesse initiale

  function animate(){
    velocity *= 0.985; // friction réaliste
    angle += velocity;

    draw();

    if(velocity > 0.002){
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      finalize();
    }
  }

  animate();
}

/* 🎯 CALCUL RÉSULTAT RÉEL */
function finalize(){
  const choices = getChoices();
  const total = choices.length;
  const segment = (2*Math.PI)/total;

  // position du pointeur (haut)
  const pointerAngle = (3*Math.PI/2 - angle) % (2*Math.PI);

  let index = Math.floor(pointerAngle / segment);

  // sécurité modulo
  index = (index + total) % total;

  document.getElementById("result").innerText =
    "Résultat : " + choices[index];
}

/* events */
canvas.addEventListener("click", spin);
canvas.addEventListener("touchstart", spin);

draw();
</script>

</body>
</html>
